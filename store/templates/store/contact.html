{% extends 'store/base.html' %}

{% block title %}Contact Us | Premium Tees{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="text-center mb-5">
                <h1 class="display-4 fw-bold mb-3">Get in Touch</h1>
                <p class="lead text-muted">Have a question about sizing, fabrics, or an existing order? Drop us a line below.</p>
            </div>

            <div class="card p-5 shadow-sm">
                <form method="POST">
                    {% csrf_token %}
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label for="name" class="form-label fw-bold">Full Name</label>
                            <input type="text" class="form-control form-control-lg" id="name" name="name" placeholder="John Doe" required style="border-radius: 8px;">
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label fw-bold">Email Address</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="john@example.com" required style="border-radius: 8px;">
                        </div>
                        <div class="col-12">
                            <label for="subject" class="form-label fw-bold">Subject</label>
                            <input type="text" class="form-control form-control-lg" id="subject" name="subject" placeholder="How can we help you?" required style="border-radius: 8px;">
                        </div>
                        <div class="col-12">
                            <label for="message" class="form-label fw-bold">Message</label>
                            <textarea class="form-control" id="message" name="message" rows="5" placeholder="Your message here..." required style="border-radius: 8px;"></textarea>
                        </div>
                        <div class="col-12 text-center mt-4">
                            <button type="submit" class="btn btn-primary btn-lg px-5">Send Message</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
